<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1D3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>16 Man — Live Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0B1D3A;--navy-2:#11243F;--navy-3:#182E4E;--ice:#1D8CE0;--ice-dim:rgba(29,140,224,0.15);
    --gold:#D4A72C;--gold-dim:rgba(212,167,44,0.12);--bg:#080E1A;--panel:#0E1B30;
    --text:#E6EAF1;--text-2:#A4B1C8;--text-3:#5C6E8A;--border:#1C3050;
    --win:#2DD974;--loss:#FF4D4D;--tie:#FFD644;
    --bar:Barlow Condensed,sans-serif;--mono:JetBrains Mono,monospace;--rad:12px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg);color:var(--text);font-family:var(--bar);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;overflow-x:hidden}
  .wrap{max-width:820px;margin:0 auto;padding:0 14px 90px}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(8,14,26,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
  .topbar .logo{font-family:var(--bar);font-weight:800;font-size:20px;letter-spacing:1px;text-transform:uppercase;color:#fff}
  .topbar .logo span{color:var(--ice)}
  .topbar .badge{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:6px;text-transform:uppercase}
  .topbar .badge.final{background:var(--gold-dim);color:var(--gold)}
  .topbar .badge.live{background:rgba(45,217,116,0.15);color:var(--win);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  .hero{margin:20px 0 16px;background:linear-gradient(145deg,var(--navy-2),var(--navy));border:1px solid var(--border);border-radius:var(--rad);padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(29,140,224,0.06),transparent 70%);pointer-events:none}
  .hero .matchup{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
  .hero .event-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px}
  .hero .meta{font-size:14px;color:var(--text-2);margin-bottom:22px}
  .score-row{display:flex;align-items:center;justify-content:center}
  .score-side{flex:1;text-align:center;max-width:180px}
  .score-side .team-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
  .score-side .pts{font-family:var(--mono);font-size:56px;font-weight:700;line-height:1;color:var(--text-2)}
  .score-side.winner .pts{color:var(--gold)}
  .score-sep{font-family:var(--mono);font-size:28px;color:var(--text-3);padding:0 14px;margin-top:14px}
  .hero .result-tag{display:inline-block;margin-top:16px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:6px;background:var(--gold-dim);color:var(--gold)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rad);margin-bottom:14px;overflow:hidden}
  .card-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px 12px;border-bottom:1px solid var(--border)}
  .card-hdr .bar{width:4px;height:16px;border-radius:2px;background:var(--ice);flex-shrink:0}
  .card-hdr h2{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ice)}

  .col-hdr{display:grid;grid-template-columns:30px 1fr 46px 46px 46px 46px 46px 46px 76px;gap:4px;padding:8px 14px;background:var(--navy);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3)}
  .col-hdr>div:nth-child(n+3){text-align:center}
  .col-hdr .grp-ctc{color:var(--ice)}
  .col-hdr .grp-opp{color:var(--text-2)}
  .tm-row{display:grid;grid-template-columns:30px 1fr 46px 46px 46px 46px 46px 46px 76px;gap:4px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:15px}
  .tm-row:last-child{border-bottom:none}
  .tm-row .n{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ice);text-align:center;background:var(--navy);border:1px solid var(--border);border-radius:5px;padding:3px 0}
  .tm-row .pls{font-weight:600}
  .tm-row .pls .tt{display:block;font-size:12px;font-weight:400;color:var(--text-3);margin-top:1px}
  .tm-row .sc{font-family:var(--mono);font-size:14px;font-weight:700;text-align:center;color:var(--text-2)}
  .tm-row .sc.ctc{color:var(--ice)}
  .tm-row .res{font-family:var(--mono);font-weight:700;font-size:12px;text-align:center;padding:4px 0;border-radius:5px;letter-spacing:0.5px}
  .tm-row .res.w{background:rgba(45,217,116,0.12);color:var(--win)}
  .tm-row .res.l{background:rgba(255,77,77,0.10);color:var(--loss)}
  .tm-row .res.t{background:rgba(255,214,68,0.10);color:var(--tie)}

  .skins-dash{padding:16px 18px}
  .sk-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .sk-stat{background:var(--navy);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
  .sk-stat .k{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
  .sk-stat .v{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold)}
  .sk-chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .sk-chip{background:var(--navy);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:10px 12px}
  .sk-chip .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .sk-chip .hole{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px}
  .sk-chip .score{font-family:var(--mono);font-size:16px;font-weight:700;color:#fff}
  .sk-chip .who{font-size:13px;color:var(--text-2)}
  .bb-box{margin-top:14px;background:var(--navy);border:1px solid var(--gold);border-radius:8px;padding:12px 14px}
  .bb-box .lbl{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
  .bb-box .val{font-size:14px;color:var(--text)}

  .lb-hdr{display:grid;grid-template-columns:32px 1fr 52px 52px 62px;gap:8px;padding:8px 18px;background:var(--navy);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3)}
  .lb-hdr>div:nth-child(n+3){text-align:center}
  .lb-row{display:grid;grid-template-columns:32px 1fr 52px 52px 62px;gap:8px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);font-size:14px}
  .lb-row:last-child{border-bottom:none}
  .lb-row .rank{font-family:var(--mono);font-size:12px;font-weight:700;text-align:center;color:var(--text-3)}
  .lb-row.top3 .rank{color:var(--gold)}
  .lb-row .name{font-weight:600}
  .lb-row .val{font-family:var(--mono);font-size:13px;text-align:center;color:var(--text-2)}
  .lb-row .total{font-family:var(--mono);font-size:15px;font-weight:700;text-align:center;color:#fff}
  .lb-row.top3 .total{color:var(--gold)}

  .rsvp-hdr{display:grid;grid-template-columns:1fr 50px 50px;padding:8px 18px;background:var(--navy);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3)}
  .rsvp-hdr>div:nth-child(n+2){text-align:center}
  .rsvp-wrap{display:grid;grid-template-columns:1fr 1fr}
  .rsvp-wrap>div:nth-child(odd){border-right:1px solid var(--border)}
  .rsvp-item{display:grid;grid-template-columns:1fr 50px 50px;padding:9px 18px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
  .rsvp-item:last-child{border-bottom:none}
  .rsvp-item .dot{width:10px;height:10px;border-radius:50%;margin:0 auto;display:block}
  .rsvp-item .dot.y{background:var(--win);box-shadow:0 0 8px rgba(45,217,116,0.3)}
  .rsvp-item .dot.n{background:var(--border)}
  .foot{text-align:center;padding:28px 0 0;font-size:12px;color:var(--text-3);letter-spacing:0.5px}
  .foot strong{color:var(--ice)}

  @media(max-width:600px){
    .hero .event-title{font-size:22px}.score-side .pts{font-size:44px}
    .sk-stats{grid-template-columns:repeat(2,1fr)}
    .col-hdr,.tm-row{grid-template-columns:26px 1fr 38px 38px 38px 38px 38px 38px 62px;gap:2px;font-size:13px;padding:9px 10px}
    .tm-row .sc{font-size:12px}
    .lb-row,.lb-hdr{grid-template-columns:28px 1fr 46px 46px 56px;padding:9px 14px}
    .rsvp-wrap{grid-template-columns:1fr}.rsvp-wrap>div:nth-child(odd){border-right:none}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>16</span> Man</div>
  <div class="badge" id="status-badge"></div>
</div>

<div class="wrap">
  <div class="hero">
    <div class="matchup" id="h-matchup"></div>
    <div class="event-title" id="h-title"></div>
    <div class="meta" id="h-meta"></div>
    <div class="score-row">
      <div class="score-side" id="s-ctc"><div class="team-label">CTC</div><div class="pts" id="ctc-pts">—</div></div>
      <div class="score-sep">–</div>
      <div class="score-side" id="s-opp"><div class="team-label" id="opp-label">OPP</div><div class="pts" id="opp-pts">—</div></div>
    </div>
    <div class="result-tag" id="result-tag"></div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="bar"></div><h2>Team Matches</h2></div>
    <div class="col-hdr">
      <div></div><div>Players</div>
      <div class="grp-ctc">F</div><div class="grp-ctc">B</div><div class="grp-ctc">T</div>
      <div class="grp-opp">F</div><div class="grp-opp">B</div><div class="grp-opp">T</div>
      <div>Pts</div>
    </div>
    <div id="teams-list"></div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="bar" style="background:var(--gold)"></div><h2 style="color:var(--gold)">Skins</h2></div>
    <div class="skins-dash">
      <div class="sk-stats">
        <div class="sk-stat"><div class="k">Skins</div><div class="v" id="sk-ct">—</div></div>
        <div class="sk-stat"><div class="k">$/Skin</div><div class="v" id="sk-per">—</div></div>
        <div class="sk-stat"><div class="k">Pool</div><div class="v" id="sk-pool">—</div></div>
        <div class="sk-stat"><div class="k">Best Ball</div><div class="v" id="sk-bb">—</div></div>
      </div>
      <div class="sk-chips" id="sk-list"></div>
      <div class="bb-box" id="bb-box">
        <div class="lbl">Best Ball Purse ($<span id="bb-amt"></span>)</div>
        <div class="val" id="bb-winner"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="bar"></div><h2>Individual Leaderboard</h2></div>
    <div class="lb-hdr"><div></div><div>Player</div><div>Front</div><div>Back</div><div>Total</div></div>
    <div id="lb-list"></div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="bar"></div><h2>RSVP & Payment</h2></div>
    <div class="rsvp-hdr"><div>Player</div><div>Skins</div><div>Paid</div></div>
    <div class="rsvp-wrap" id="rsvp-list"></div>
  </div>

  <div class="foot"><strong>16 MAN</strong> · Scorekeeper updates · Bookmark this page</div>
</div>

<script>
(function() {
  const E = EVENT;
  const $ = id => document.getElementById(id);
  const fmt = n => Number.isInteger(n) ? ''+n : n.toFixed(1);

  const badge = $('status-badge');
  badge.textContent = E.status === 'LIVE' ? '● LIVE' : 'FINAL';
  badge.className = 'badge ' + (E.status === 'LIVE' ? 'live' : 'final');

  $('h-matchup').textContent = E.ctcCourse + ' vs. ' + E.oppCourse;
  $('h-title').textContent = E.title;
  $('h-meta').textContent = E.date;
  $('opp-label').textContent = E.oppName;

  function subPts(ctc, opp) {
    if (ctc == null || opp == null) return [0, 0];
    if (ctc < opp) return [1, 0];
    if (ctc > opp) return [0, 1];
    return [0.5, 0.5];
  }

  let cP = 0, oP = 0;
  E.teams.forEach(t => {
    if (t.ctcF == null || t.oppF == null) return;
    const [cf, of_] = subPts(t.ctcF, t.oppF);
    const [cb, ob] = subPts(t.ctcB, t.oppB);
    const [ct, ot] = subPts(t.ctcT, t.oppT);
    t._cP = cf + cb + ct;
    t._oP = of_ + ob + ot;
    cP += t._cP; oP += t._oP;
  });

  $('ctc-pts').textContent = fmt(cP);
  $('opp-pts').textContent = fmt(oP);
  if (cP > oP) { $('s-ctc').classList.add('winner'); $('result-tag').textContent = 'CTC Wins ' + fmt(cP) + ' – ' + fmt(oP); }
  else if (cP < oP) { $('s-opp').classList.add('winner'); $('result-tag').textContent = E.oppName + ' Wins ' + fmt(oP) + ' – ' + fmt(cP); }
  else { $('result-tag').textContent = 'Tied ' + fmt(cP) + ' – ' + fmt(oP); }

  const tl = $('teams-list');
  E.teams.forEach(t => {
    const cp = t._cP ?? 0, op = t._oP ?? 0;
    let rc = '', rt = '—';
    if (t.ctcF != null && t.oppF != null) {
      if (cp > op) { rc='w'; } else if (cp < op) { rc='l'; } else { rc='t'; }
      rt = fmt(cp) + ' – ' + fmt(op);
    }
    const d = document.createElement('div'); d.className='tm-row';
    d.innerHTML = `
      <div class="n">${t.num}</div>
      <div class="pls">${t.a} / ${t.b}<span class="tt">${t.tt||''}</span></div>
      <div class="sc ctc">${t.ctcF??'—'}</div><div class="sc ctc">${t.ctcB??'—'}</div><div class="sc ctc">${t.ctcT??'—'}</div>
      <div class="sc">${t.oppF??'—'}</div><div class="sc">${t.oppB??'—'}</div><div class="sc">${t.oppT??'—'}</div>
      <div class="res ${rc}">${rt}</div>`;
    tl.appendChild(d);
  });

  $('sk-ct').textContent = E.skins.length;
  $('sk-per').textContent = '$'+E.purse.perSkin;
  $('sk-pool').textContent = '$'+E.purse.skinsPurse;
  $('sk-bb').textContent = '$'+E.purse.bestBall;
  const sl = $('sk-list');
  E.skins.forEach(s => {
    const d = document.createElement('div'); d.className='sk-chip';
    d.innerHTML = `<div class="top"><span class="hole">HOLE ${s.hole}</span><span class="score">${s.score}</span></div><div class="who">${s.who}</div>`;
    sl.appendChild(d);
  });
  $('bb-amt').textContent = E.purse.bestBall;
  if (E.purse.bestBallWinner) { $('bb-winner').textContent = E.purse.bestBallWinner; } else { $('bb-box').style.display = 'none'; }

  const lb = $('lb-list');
  [...E.players].filter(p=>p.total!=null).sort((a,b)=>a.total-b.total).forEach((p,i) => {
    const d = document.createElement('div');
    d.className = 'lb-row' + (i<3?' top3':'');
    d.innerHTML = `<div class="rank">${i+1}</div><div class="name">${p.name}</div><div class="val">${p.front??'—'}</div><div class="val">${p.back??'—'}</div><div class="total">${p.total??'—'}</div>`;
    lb.appendChild(d);
  });

  const rv = $('rsvp-list');
  E.players.forEach(p => {
    const d = document.createElement('div'); d.className='rsvp-item';
    d.innerHTML = `<div>${p.name}</div><div><span class="dot ${p.inSkins?'y':'n'}"></span></div><div><span class="dot ${p.paid?'y':'n'}"></span></div>`;
    rv.appendChild(d);
  });
})();
</script>
</body>
</html>
